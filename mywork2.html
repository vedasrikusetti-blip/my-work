<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Gallery Marketplace</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(to right,#f8f9fa,#dfe9f3);
    min-height:100vh;
    font-family: Arial, sans-serif;
}

.header{
    text-align:center;
    padding:30px;
}

.header h1{
    color:#2c3e50;
    font-weight:bold;
}

.search-container{
    max-width:700px;
    margin:auto;
}

.card{
    transition:0.3s;
    height:100%;
}

.card:hover{
    transform:translateY(-5px);
}

.art-img{
    height:300px;
    object-fit:cover;
}

.loading{
    text-align:center;
    font-size:24px;
    margin-top:30px;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🎨 Art Gallery Marketplace</h1>
        <p>Search and explore famous artworks</p>
    </div>

    <div class="search-container">
        <div class="input-group mb-4">
            <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="Enter Artwork Name">
            <button
                class="btn btn-primary"
                onclick="searchArt()">
                Search
            </button>
        </div>
    </div>

    <div id="result" class="row"></div>

</div>

<script>

async function searchArt(){

    const keyword = document.getElementById("searchInput").value.trim();

    const result = document.getElementById("result");

    if(keyword===""){
        alert("Please enter artwork name");
        return;
    }

    result.innerHTML =
    `
    <div class="loading">
        Loading Artworks...
    </div>
    `;

    try{

        const response = await fetch(
        `https://api.artic.edu/api/v1/artworks/search?q=${keyword}&fields=id,title,artist_display,date_display,image_id`
        );

        const data = await response.json();

        if(data.data.length===0){
            result.innerHTML =
            `
            <h3 class="text-center text-danger">
            No Artwork Found
            </h3>
            `;
            return;
        }

        let cards="";

        data.data.forEach(art=>{

            const imageUrl = art.image_id
            ? `https://www.artic.edu/iiif/2/${art.image_id}/full/843,/0/default.jpg`
            : "https://via.placeholder.com/400x300";

            cards +=
            `
            <div class="col-md-4 mb-4">

                <div class="card shadow">

                    <img
                    src="${imageUrl}"
                    class="card-img-top art-img"
                    alt="Artwork">

                    <div class="card-body">

                        <h5 class="card-title">
                            ${art.title || "Unknown Title"}
                        </h5>

                        <p>
                            <strong>Artist:</strong><br>
                            ${art.artist_display || "Not Available"}
                        </p>

                        <p>
                            <strong>Year:</strong>
                            ${art.date_display || "Unknown"}
                        </p>

                    </div>

                </div>

            </div>
            `;
        });

        result.innerHTML = cards;
    }

    catch(error){

        result.innerHTML =
        `
        <h3 class="text-center text-danger">
            Error Fetching Data
        </h3>
        `;

        console.log(error);
    }
}

</script>

</body>
</html>
